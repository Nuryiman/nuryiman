<svg width="860" height="200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{r:4} 50%{r:6} }
    @keyframes scan { from{transform:translateY(0)} to{transform:translateY(160px)} }
    .t1{animation:fadeUp .6s ease .1s both}
    .t2{animation:fadeUp .6s ease .3s both}
    .t3{animation:fadeUp .6s ease .5s both}
    .t4{animation:fadeUp .6s ease .7s both}
    .t5{animation:fadeUp .6s ease .9s both}
    .t6{animation:fadeUp .6s ease 1.1s both}
    .cursor{animation:blink 1s infinite}
    .dot1{animation:pulse 2s ease-in-out infinite}
    .dot2{animation:pulse 2s ease-in-out .4s infinite}
    .dot3{animation:pulse 2s ease-in-out .8s infinite}
    .scan{animation:scan 3s linear infinite;opacity:.04}
  </style>
</defs>
